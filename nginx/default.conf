# HTTP Server - Redirige todo a HTTPS (excepto el desafío de Certbot)
server {
    listen 80;
    server_name aandgri.duckdns.org;   # <-- CAMBIA por tu dominio real
    charset utf-8;
    client_max_body_size 20M;

    # Ruta para la validación de Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirigir el resto del tráfico a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    server_name aandgri.duckdns.org;   # <-- CAMBIA por tu dominio real
    charset utf-8;
    client_max_body_size 20M;

    # Certificados SSL (Certbot)
    ssl_certificate /etc/nginx/ssl/live/aandgri.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/aandgri.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    include /etc/nginx/ssl/options-ssl-nginx.conf;   # Parámetros SSL recomendados por Certbot
    ssl_dhparam /etc/nginx/ssl/ssl-dhparams.pem;

    # Security headers (igual que tenías)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static files
    location /static/ {
        alias /static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # Proxy a Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}