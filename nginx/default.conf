# Redirigir HTTP a HTTPS (excepto el desafío de Certbot)
server {
    listen 80;
    server_name aandgri.duckdns.org;
    charset utf-8;
    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor HTTPS
server {
    listen 443 ssl http2;
    server_name aandgri.duckdns.org;
    charset utf-8;
    client_max_body_size 20M;

    # Rutas de los certificados (dentro del contenedor)
    ssl_certificate /etc/letsencrypt/live/aandgri.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aandgri.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Archivos estáticos
    location /static/ {
        alias /static/;
        expires 7d;
    }

    location /media/ {
        alias /media/;
        expires 7d;
    }

    # Denegar acceso a archivos sensibles
    location ~ /\. {
        deny all;
    }

    # Proxy a Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}