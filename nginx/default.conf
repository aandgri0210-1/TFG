server {
    listen 80;
    server_name aandgri.duckdns.org;
    charset utf-8;
    client_max_body_size 20M;

    # ----- EXCEPCIÓN PARA CERTBOT (DEBE IR PRIMERO) -----
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Resto de configuración (incluyendo seguridad)
    location /static/ {
        alias /static/;
        expires 7d;
    }

    location /media/ {
        alias /media/;
        expires 7d;
    }

    # Denegar acceso a archivos sensibles (pero .well-known ya fue tratado)
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}