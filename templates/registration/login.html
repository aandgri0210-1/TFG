{% extends 'base.html' %}
{% block title %}Iniciar sesión | LocalMarket{% endblock %}
{% block content %}
<div class="auth-shell mx-auto">
  <div class="auth-card card-glass">
    <h1 class="section-title">Iniciar sesión</h1>
    <p class="section-lead">Accede para gestionar tus servicios, solicitudes y valoraciones.</p>
    <form method="post" class="stack-form">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div class="mb-3">
        <label class="form-label" for="id_username">Usuario</label>
        {{ form.username }}
      </div>
      <div class="mb-3">
        <label class="form-label" for="id_password">Contraseña</label>
        {{ form.password }}
      </div>
      <button class="btn btn-primary btn-wide" type="submit">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
