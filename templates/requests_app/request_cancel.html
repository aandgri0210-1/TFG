{% extends 'base.html' %}
{% block title %}Cancelar solicitud | LocalMarket{% endblock %}
{% block content %}
<div class="section-header mb-4">
  <span class="eyebrow">Solicitudes</span>
  <h1 class="section-title">Cancelar solicitud</h1>
</div>
<div class="card-glass p-4">
  <p>Vas a cancelar la solicitud de <strong>{{ service_request.service.title }}</strong>.</p>
  <form method="post" class="stack-form">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label" for="{{ form.cancellation_reason.id_for_label }}">{{ form.cancellation_reason.label|default:'Motivo de cancelación' }}</label>
      {{ form.cancellation_reason }}
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-warning" type="submit">Confirmar cancelación</button>
      <a class="btn btn-outline-light" href="{% url 'requests_app:request_history' %}">Volver</a>
    </div>
  </form>
</div>
{% endblock %}
